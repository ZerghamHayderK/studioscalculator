<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Price Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --primary-green: #37b36f;
            --dark-bg: #000000;
            --card-bg: rgba(15, 15, 15, 0.95);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Minimal Glistening Stars --- */
        #star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: glisten var(--duration) infinite ease-in-out;
        }

        @keyframes glisten {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); box-shadow: 0 0 8px white; }
        }

        /* --- Layout --- */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        .header { margin-bottom: 40px; }
        .logo-text {
            font-size: 3rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--primary-green);
        }
        .logo-icon { border: 3px solid var(--primary-green); border-radius: 50%; padding: 5px; width: 40px; height: 40px; }
        
        .sub-header {
            font-size: 1.8rem;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 10px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* --- Calculator Card --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .section-title {
            text-align: center;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .form-group { margin-bottom: 25px; }
        label {
            display: block;
            color: var(--primary-green);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background: #080808;
            border: 1px solid #222;
            color: #fff;
            border-radius: 6px;
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-green);
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: #2ea362;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover { background: #37b36f; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(55, 179, 111, 0.4); }

        /* --- Pricing Result Table --- */
        #quotation { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; display: none; }
        .quote-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .total-box { background: #111; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px dashed var(--primary-green); }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <div class="container">
        <div class="header">
            <div class="logo-text">
                <span class="logo-icon">🏠</span> Bayut Studios
            </div>
            <div class="sub-header">Price Calculator</div>
        </div>

        <div class="card">
            <div class="section-title">Configure Your Project Scope</div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="categorySelect" onchange="filterProducts()">
                    <option value="">Loading categories...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Product Service</label>
                <select id="productSelect">
                    <option value="">Select Category First</option>
                </select>
            </div>

            <div class="form-group">
                <label>Units Required</label>
                <input type="number" id="units" value="1" min="1">
            </div>

            <button class="btn-add" onclick="calculate()">Add to Quotation</button>

            <div id="quotation">
                <div class="total-box">
                    <div class="quote-row"><strong>Total PKR:</strong> <span id="resPKR">0</span></div>
                    <div class="quote-row"><strong>Total USD:</strong> <span id="resUSD">0</span></div>
                    <div class="quote-row"><strong>Total SAR:</strong> <span id="resSAR">0</span></div>
                    <div class="quote-row"><strong>Total AED:</strong> <span id="resAED">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. YOUR PUBLISHED CSV LINK HERE
        const SHEET_URL = "PASTE_YOUR_PUBLISHED_CSV_LINK_HERE";
        
        let masterData = [];

        // Initialize Stars
        const field = document.getElementById('star-field');
        for(let i=0; i<80; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            let size = Math.random() * 2 + 1 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(s);
        }

        // Fetch Data
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            complete: function(results) {
                masterData = results.data;
                populateCategories();
            }
        });

        function populateCategories() {
            const cats = [...new Set(masterData.map(item => item['Product Category']))].filter(Boolean);
            const sel = document.getElementById('categorySelect');
            sel.innerHTML = '<option value="">Select Category</option>';
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function filterProducts() {
            const cat = document.getElementById('categorySelect').value;
            const sel = document.getElementById('productSelect');
            sel.innerHTML = '<option value="">Select Product</option>';
            masterData.filter(i => i['Product Category'] === cat)
                      .forEach(i => sel.innerHTML += `<option value="${i.Product}">${i.Product}</option>`);
        }

        function calculate() {
            const pName = document.getElementById('productSelect').value;
            const qty = document.getElementById('units').value;
            const item = masterData.find(i => i.Product === pName);
            
            if(!item) return;

            // Helper to clean numeric strings like "PKR 172,023"
            const clean = (val) => parseFloat(val.replace(/[^\d.]/g, '')) || 0;

            document.getElementById('resPKR').innerText = (clean(item['Total Cost (PKR)']) * qty).toLocaleString() + " PKR";
            document.getElementById('resUSD').innerText = "$" + (clean(item['Total Price (USD)']) * qty).toLocaleString();
            document.getElementById('resSAR').innerText = (clean(item['Total Price (SAR)']) * qty).toLocaleString() + " SAR";
            document.getElementById('resAED').innerText = (clean(item['Total Price (AED)']) * qty).toLocaleString() + " AED";
            
            document.getElementById('quotation').style.display = 'block';
        }
    </script>
</body>
</html>
