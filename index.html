<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Price Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --primary-green: #37b36f;
            --dark-bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Starry Background Animation --- */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        /* --- UI Layout --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(55, 179, 111, 0.3));
        }

        h1 {
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--primary-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .calculator-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: left;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--primary-green);
        }

        select, input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-family: 'Montserrat';
            transition: 0.3s;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 10px rgba(55, 179, 111, 0.2);
        }

        /* --- Result Section --- */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        .price-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .price-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
        }

        .highlight {
            color: var(--primary-green);
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="container">
        <img src="logo.png" alt="Bayut Studios" class="logo">
        <h1>Price Calculator</h1>

        <div class="calculator-card">
            <div class="form-group">
                <label>Product Category</label>
                <select id="categorySelect" onchange="updateProducts()">
                    <option value="">Select Category</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Product</label>
                <select id="productSelect" onchange="calculatePrice()">
                    <option value="">Select a Category first</option>
                </select>
            </div>

            <div class="form-group">
                <label>Units Required</label>
                <input type="number" id="unitInput" value="1" min="1" oninput="calculatePrice()">
            </div>

            <div class="result-grid">
                <div class="price-box">
                    <div class="price-label">Total PKR</div>
                    <div class="price-value highlight" id="pricePKR">0</div>
                </div>
                <div class="price-box">
                    <div class="price-label">Total USD</div>
                    <div class="price-value" id="priceUSD">$0</div>
                </div>
                <div class="price-box">
                    <div class="price-label">Total SAR</div>
                    <div class="price-value" id="priceSAR">0</div>
                </div>
                <div class="price-box">
                    <div class="price-label">Total AED</div>
                    <div class="price-value" id="priceAED">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let masterData = [];

        // 1. Generate Stars
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            container.appendChild(star);
        }

        // 2. Load Data from CSV
        // In GitHub Pages, 'data.csv' should be in the same repo
        Papa.parse("data.csv", {
            download: true,
            header: true,
            complete: function(results) {
                masterData = results.data;
                populateCategories();
            }
        });

        function populateCategories() {
            const categories = [...new Set(masterData.map(item => item['Product Category']))];
            const select = document.getElementById('categorySelect');
            categories.forEach(cat => {
                if(cat) {
                    let opt = document.createElement('option');
                    opt.value = cat;
                    opt.innerHTML = cat;
                    select.appendChild(opt);
                }
            });
        }

        function updateProducts() {
            const category = document.getElementById('categorySelect').value;
            const productSelect = document.getElementById('productSelect');
            productSelect.innerHTML = '<option value="">Select Product</option>';
            
            const filtered = masterData.filter(item => item['Product Category'] === category);
            filtered.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item['Product'];
                opt.innerHTML = item['Product'];
                productSelect.appendChild(opt);
            });
        }

        function calculatePrice() {
            const productName = document.getElementById('productSelect').value;
            const units = document.getElementById('unitInput').value || 1;
            const product = masterData.find(item => item['Product'] === productName);

            if (product) {
                // Remove commas from strings to treat as numbers
                const cleanPrice = (val) => parseFloat(val.replace(/[^\d.]/g, '')) || 0;
                
                const pkr = cleanPrice(product['Total Cost (PKR)']) * units;
                const usd = cleanPrice(product['Total Price (USD)']) * units;
                const sar = cleanPrice(product['Total Price (SAR)']) * units;
                const aed = cleanPrice(product['Total Price (AED)']) * units;

                document.getElementById('pricePKR').innerText = pkr.toLocaleString();
                document.getElementById('priceUSD').innerText = '$' + usd.toLocaleString();
                document.getElementById('priceSAR').innerText = sar.toLocaleString();
                document.getElementById('priceAED').innerText = aed.toLocaleString();
            }
        }
    </script>
</body>
</html>
