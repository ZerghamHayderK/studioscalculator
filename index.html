<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Price Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* STAR LAYERS */
        body::before, body::after, .extra-stars {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        body::before {
            background: radial-gradient(2px 2px at 10% 20%, #fff, transparent), radial-gradient(2px 2px at 30% 50%, #fff, transparent), radial-gradient(2px 2px at 70% 80%, #fff, transparent), radial-gradient(2px 2px at 90% 10%, #fff, transparent), radial-gradient(2px 2px at 50% 40%, #fff, transparent);
            background-size: 300px 300px;
            animation: glisten-a 4s infinite alternate;
        }

        body::after {
            background: radial-gradient(3px 3px at 15% 35%, var(--primary-green), transparent), radial-gradient(3px 3px at 85% 65%, var(--primary-green), transparent), radial-gradient(3px 3px at 45% 75%, var(--primary-green), transparent);
            background-size: 400px 400px;
            animation: glisten-b 6s infinite alternate;
        }

        @keyframes glisten-a { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes glisten-b { 0% { opacity: 1; } 100% { opacity: 0.4; } }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        .logo { width: 80px; border-radius: 15px; margin-right: 15px; }
        .rich-header { text-align: center; font-weight: 900; letter-spacing: 12px; text-transform: uppercase; margin: 20px 0; text-shadow: 0 0 40px rgba(55, 179, 111, 0.8); font-size: 2.5rem; }
        
        .glass-panel {
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 8px; color: var(--primary-green); text-transform: uppercase; }
        
        select, input {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--glass-border); color: white;
            border-radius: 6px; font-family: 'Montserrat', sans-serif; box-sizing: border-box; outline: none;
        }

        .btn-add {
            width: 100%; background: linear-gradient(135deg, #1a6b4a 0%, #37b36f 100%);
            border: none; color: white; font-weight: 900; letter-spacing: 3px; padding: 1rem;
            border-radius: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .btn-add:hover:not(:disabled) { box-shadow: 0 0 20px rgba(55, 179, 111, 0.5); transform: translateY(-2px); }

        .item-card {
            background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 10px; margin-bottom: 10px;
            border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;
        }

        .bold-currency { font-family: 'Inter', sans-serif; font-weight: 900; color: var(--primary-green); }
        .btn-del { background: transparent; border: none; color: #ff4b4b; font-size: 1.5rem; cursor: pointer; }

        .valuation-card {
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 40px; border-radius: 20px;
            background: rgba(55, 179, 111, 0.1); text-align: center; margin-top: 40px; backdrop-filter: blur(10px);
        }

        .val-main { font-size: 3.5rem; font-weight: 900; margin: 10px 0; }
        .val-grid { display: flex; justify-content: center; gap: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px; margin-top: 20px; }
        .clear-btn { background: transparent; color: white; border: 1px solid var(--glass-border); padding: 10px; width: 100%; margin-top: 20px; cursor: pointer; border-radius: 8px; }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="./wlogo.png" alt="Logo" class="logo">
            <span style="color: var(--primary-green); font-size: 3rem; font-weight:900;">Bayut Studios</span>
        </div>
        <h1 class="rich-header">Price Calculator</h1>

        <div class="glass-panel">
            <h2 style="color: white; font-size: 0.9rem; letter-spacing: 4px; text-align: center; margin-bottom: 30px; font-weight: 200;">CONFIGURE YOUR PROJECT SCOPE</h2>
            <div id="loadingMessage" class="loading-message" style="text-align:center; color: var(--primary-green);">Connecting to Engine...</div>
            
            <div id="formFields" style="display: none;">
                <div class="form-group">
                    <label>CATEGORY</label>
                    <select id="categorySelect" onchange="updateProductList()"></select>
                </div>
                <div class="form-group">
                    <label>PRODUCT SERVICE</label>
                    <select id="productSelect"></select>
                </div>
                <div class="form-group">
                    <label>UNITS REQUIRED</label>
                    <input type="number" id="unitsInput" value="1" min="1">
                </div>
                <button class="btn-add" onclick="addToCart()" id="addButton">Add to Quotation</button>
            </div>
        </div>

        <h3 id="scopeHeader" style="display:none; letter-spacing: 5px; font-weight: 200; text-align: center;">CURRENT SCOPE</h3>
        <div id="cartItems"></div>

        <div id="valuationCard" class="valuation-card" style="display:none;">
            <p style="letter-spacing: 5px; color: var(--primary-green); font-weight: 700;">✦ TOTAL VALUATION ✦</p>
            <h1 class="val-main" id="totalPKR">PKR 0</h1>
            <div class="val-grid">
                <div>
                    <p style="color: var(--primary-green); font-size: 0.8rem; font-weight:900; letter-spacing: 2px;">SAR</p>
                    <h2 id="totalSAR" style="margin:0;">0.00</h2>
                </div>
                <div>
                    <p style="color: var(--primary-green); font-size: 0.8rem; font-weight:900; letter-spacing: 2px;">AED</p>
                    <h2 id="totalAED" style="margin:0;">0.00</h2>
                </div>
            </div>
            <button class="clear-btn" onclick="clearCart()">CLEAR ALL QUOTATION</button>
        </div>
    </div>

    <script>
        let cart = [];
        let serviceData = [];
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';

        // 1. IMPROVED CSV PARSER (Handles currency commas correctly)
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const result = [];
                let cell = '';
                let inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        result.push(cell.trim());
                        cell = '';
                    } else cell += char;
                }
                result.push(cell.trim());
                return result;
            });
        }

        // 2. CURRENCY CLEANER
        function cleanValue(val) {
            if (!val) return 0;
            return parseFloat(val.replace(/[^\d.]/g, '')) || 0;
        }

        async function loadSheetData() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                const headers = rows[0].map(h => h.toLowerCase());

                // Find column indices
                const idx = {
                    cat: headers.findIndex(h => h.includes('category')),
                    prod: headers.findIndex(h => h.includes('product') && !h.includes('category')),
                    pkr: headers.findIndex(h => h.includes('pkr')),
                    sar: headers.findIndex(h => h.includes('sar')),
                    aed: headers.findIndex(h => h.includes('aed'))
                };

                serviceData = rows.slice(1).map(row => ({
                    category: row[idx.cat],
                    name: row[idx.prod],
                    pkr: cleanValue(row[idx.pkr]),
                    sar: cleanValue(row[idx.sar]),
                    aed: cleanValue(row[idx.aed])
                })).filter(item => item.name && item.pkr > 0);

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('formFields').style.display = 'block';
                initDropdowns();
            } catch (e) {
                document.getElementById('loadingMessage').innerHTML = "Engine offline. Please check Sheet publication.";
            }
        }

        function initDropdowns() {
            const catSelect = document.getElementById('categorySelect');
            const categories = [...new Set(serviceData.map(i => i.category))];
            catSelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            updateProductList();
        }

        function updateProductList() {
            const cat = document.getElementById('categorySelect').value;
            const prodSelect = document.getElementById('productSelect');
            const products = serviceData.filter(i => i.category === cat);
            prodSelect.innerHTML = products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        }

        function addToCart() {
            const name = document.getElementById('productSelect').value;
            const units = parseInt(document.getElementById('unitsInput').value);
            const data = serviceData.find(i => i.name === name);
            const existing = cart.find(i => i.name === name);

            if (existing) existing.units += units;
            else cart.push({ ...data, units });
            
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const valCard = document.getElementById('valuationCard');
            const scopeHeader = document.getElementById('scopeHeader');
            
            if (cart.length === 0) {
                valCard.style.display = scopeHeader.style.display = "none";
                container.innerHTML = "";
                return;
            }

            valCard.style.display = scopeHeader.style.display = "block";
            let tPKR = 0, tSAR = 0, tAED = 0;

            container.innerHTML = cart.map((item, i) => {
                const p = item.pkr * item.units;
                const s = item.sar * item.units;
                const a = item.aed * item.units;
                tPKR += p; tSAR += s; tAED += a;

                return `
                    <div class="item-card">
                        <div>
                            <b>${item.name} (x${item.units})</b>
                            <p style="font-size:0.8rem; margin-top:5px; opacity:0.8;">
                                <span class="bold-currency">SAR ${s.toLocaleString()}</span> | 
                                <span class="bold-currency">AED ${a.toLocaleString()}</span>
                            </p>
                        </div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <b style="font-size:1.2rem;">PKR ${p.toLocaleString()}</b>
                            <button class="btn-del" onclick="removeItem(${i})">×</button>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById('totalPKR').innerText = `PKR ${tPKR.toLocaleString()}`;
            document.getElementById('totalSAR').innerText = tSAR.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('totalAED').innerText = tAED.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function removeItem(i) { cart.splice(i, 1); renderCart(); }
        function clearCart() { cart = []; renderCart(); }

        loadSheetData();
    </script>
</body>
</html>
